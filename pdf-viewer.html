<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background-color: #1e1e1e; color: #fff; }
    
    .header {
      height: 60px;
      background: #2d2d2d;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      position: fixed;
      top: 0; width: 100%; z-index: 100;
    }
    .title { font-size: 18px; font-weight: bold; }
    
    .btn-download {
      background: #007bff;
      color: white;
      padding: 10px 20px;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }
    .btn-download:hover { background: #0056b3; }

    .pdf-container {
      margin-top: 60px;
      height: calc(100vh - 60px);
      width: 100%;
    }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>

  <div class="header">
    <div class="title" id="pdfTitle">Document Viewer</div>
    <a id="downloadBtn" class="btn-download" href="integrationone.pdf" download>Download PDF</a>
  </div>

  <div class="pdf-container">
    <iframe id="pdfFrame" src=""></iframe>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const pdfUrl = urlParams.get('file');

    if (pdfUrl) {
      const viewerUrl = `https://mozilla.github.io/pdf.js/web/viewer.html?file=${encodeURIComponent(pdfUrl)}`;
      document.getElementById('pdfFrame').src = viewerUrl;
      document.getElementById('downloadBtn').href = pdfUrl;
      
      const fileName = pdfUrl.split('/').pop();
      document.getElementById('pdfTitle').innerText = fileName;
    } else {
      document.body.innerHTML = "<h2 style='text-align:center; padding-top:100px;'>No PDF file specified.</h2>";
    }
  </script>

</body>
</html>
