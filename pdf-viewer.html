<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.worker.min.js";

const canvas =
document.getElementById("pdfCanvas");

const ctx =
canvas.getContext("2d");

let pdfDoc = null;

let currentPage = 1;

let totalPages = 0;

let zoom = 1;

let rotation = 0;

let renderTask = null;

let pdfFile = "";

const params =
new URLSearchParams(window.location.search);

pdfFile =
params.get("file") || "../pdf/sample.pdf";

const pageNumber =
document.getElementById("pageNumber");

const pageCount =
document.getElementById("pageCount");

const loadingScreen =
document.getElementById("loadingScreen");

const toast =
document.getElementById("toast");

const viewerContainer =
document.getElementById("viewerContainer");

const gotoPage =
document.getElementById("gotoPage");

const zoomSelect =
document.getElementById("zoomSelect");

const infoCard =
document.getElementById("infoCard");

const infoText =
document.getElementById("pdfInformation");

async function loadPDF(){

toast.style.display="block";

toast.innerHTML="Loading PDF...";

pdfDoc =
await pdfjsLib.getDocument(pdfFile).promise;

totalPages =
pdfDoc.numPages;

pageCount.innerHTML =
totalPages;

gotoPage.max =
totalPages;

loadingScreen.style.display="none";

renderPage(currentPage);

infoText.innerHTML=
"Pages : "+totalPages+"<br>File : "+pdfFile;
}

async function renderPage(pageNumberValue){

if(renderTask){

try{

renderTask.cancel();

}catch(e){}

}

const page =
await pdfDoc.getPage(pageNumberValue);

const viewport =
page.getViewport({
scale:zoom,
rotation:rotation
});

canvas.width =
viewport.width;

canvas.height =
viewport.height;

const renderContext={

canvasContext:ctx,

viewport:viewport

};

renderTask=
page.render(renderContext);

await renderTask.promise;

pageNumber.innerHTML=
pageNumberValue;

gotoPage.value=
pageNumberValue;

toast.style.display="none";

}

loadPDF();

document
.getElementById("nextPage")
.onclick=function(){

if(currentPage<totalPages){

currentPage++;

renderPage(currentPage);

}

};

document
.getElementById("prevPage")
.onclick=function(){

if(currentPage>1){

currentPage--;

renderPage(currentPage);

}

};

document
.getElementById("nextBottom")
.onclick=function(){

if(currentPage<totalPages){

currentPage++;

renderPage(currentPage);

}

};

document
.getElementById("prevBottom")
.onclick=function(){

if(currentPage>1){

currentPage--;

renderPage(currentPage);

}

};

document
.getElementById("firstPage")
.onclick=function(){

currentPage=1;

renderPage(currentPage);

};

document
.getElementById("lastPage")
.onclick=function(){

currentPage=totalPages;

renderPage(currentPage);

};

document
.getElementById("goPage")
.onclick=function(){

const page=
parseInt(gotoPage.value);

if(page>=1 && page<=totalPages){

currentPage=page;

renderPage(currentPage);

}

};

zoomSelect.onchange=function(){

const value=this.value;

if(value=="fitWidth"){

zoom=
viewerContainer.clientWidth/
canvas.width;

}

else if(value=="fitPage"){

zoom=Math.min(

viewerContainer.clientWidth/
canvas.width,

viewerContainer.clientHeight/
canvas.height

);

}

else if(value=="auto"){

zoom=1;

}

else{

zoom=parseFloat(value);

}

renderPage(currentPage);

};

document
.getElementById("zoomIn")
.onclick=function(){

zoom+=0.10;

zoomSelect.value="";

renderPage(currentPage);

};

document
.getElementById("zoomOut")
.onclick=function(){

if(zoom>0.30){

zoom-=0.10;

zoomSelect.value="";

renderPage(currentPage);

}

};

document
.getElementById("rotateLeft")
.onclick=function(){

rotation-=90;

renderPage(currentPage);

};

document
.getElementById("rotateRight")
.onclick=function(){

rotation+=90;

renderPage(currentPage);

};

document
.getElementById("fullscreen")
.onclick=function(){

if(!document.fullscreenElement){

document.documentElement
.requestFullscreen();

}else{

document.exitFullscreen();

}

};

document
.getElementById("menuBtn")
.onclick=function(){

leftDrawer.style.left="0";

overlay.style.display="block";

};

document
.getElementById("closeDrawer")
.onclick=function(){

leftDrawer.style.left="-330px";

overlay.style.display="none";

};

overlay.onclick=function(){

leftDrawer.style.left="-330px";

overlay.style.display="none";

};

document
.getElementById("infoBtn")
.onclick=function(){

if(infoCard.style.display=="block"){

infoCard.style.display="none";

}else{

infoCard.style.display="block";

}

};

document
.getElementById("themeBtn")
.onclick=function(){

if(document.body.style.background=="white"){

document.body.style.background="#08101f";

document.body.style.color="white";

}else{

document.body.style.background="white";

document.body.style.color="black";

}

};

document
.getElementById("searchBtn")
.onclick=function(){

const panel=
document.getElementById("searchPanel");

panel.style.display=
panel.style.display=="block"
?
"none"
:
"block";

};

document
.getElementById("refreshPdf")
.onclick=function(){

location.reload();

};

document
.getElementById("copyLink")
.onclick=function(){

navigator.clipboard
.writeText(location.href);

alert("Link Copied");

};

document
.getElementById("sharePdf")
.onclick=async function(){

if(navigator.share){

navigator.share({

title:"PDF",

url:location.href

});

}else{

alert("Sharing Not Supported");

}

};

document
.getElementById("printPdf")
.onclick=function(){

window.print();

};
document
.getElementById("downloadPdf")
.onclick = async function () {

try{

toast.style.display="block";
toast.innerHTML="Preparing Secure PDF...";

const existingPdfBytes =
await fetch(pdfFile).then(res=>res.arrayBuffer());

const pdfDoc =
await PDFLib.PDFDocument.load(existingPdfBytes);

const pages =
pdfDoc.getPages();

const helvetica =
await pdfDoc.embedFont(PDFLib.StandardFonts.HelveticaBold);

for(const page of pages){

const width =
page.getWidth();

const height =
page.getHeight();

page.drawText("Bihar Student Portal",{

x:width/2-220,

y:height/2,

size:42,

font:helvetica,

color:PDFLib.rgb(1,0,0),

opacity:0.16,

rotate:PDFLib.degrees(45)

});

page.drawText("Bihar Student Portal",{

x:40,

y:40,

size:11,

font:helvetica,

color:PDFLib.rgb(.80,0,0),

opacity:.70

});

page.drawText(

"Downloaded From Bihar Student Portal",

{

x:40,

y:22,

size:9,

font:helvetica,

color:PDFLib.rgb(.55,.55,.55)

}

);

}

const pdfBytes =
await pdfDoc.save();

const blob =
new Blob([pdfBytes],{

type:"application/pdf"

});

const url =
URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href=url;

a.download="Bihar_Student_Portal.pdf";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

URL.revokeObjectURL(url);

toast.innerHTML="Download Complete";

setTimeout(()=>{

toast.style.display="none";

},1500);

}catch(error){

console.log(error);

toast.innerHTML="Download Failed";

setTimeout(()=>{

toast.style.display="none";

},2000);

}

};

document
.getElementById("startSearch")
.onclick=function(){

const keyword=

document
.getElementById("searchText")
.value
.trim();

if(keyword==""){

alert("Enter Keyword");

return;

}

alert(
"PDF.js text search will be added in next update.\nKeyword : "+keyword
);

};

document
.addEventListener(

"keydown",

function(e){

if(e.key==="ArrowRight"){

if(currentPage<totalPages){

currentPage++;

renderPage(currentPage);

}

}

if(e.key==="ArrowLeft"){

if(currentPage>1){

currentPage--;

renderPage(currentPage);

}

}

if(e.key==="+" || e.key==="="){

zoom+=0.10;

renderPage(currentPage);

}

if(e.key==="-"){

if(zoom>0.30){

zoom-=0.10;

renderPage(currentPage);

}

}

if(e.key==="Home"){

currentPage=1;

renderPage(currentPage);

}

if(e.key==="End"){

currentPage=totalPages;

renderPage(currentPage);

}

if(e.key==="Escape"){

infoCard.style.display="none";

document.getElementById("searchPanel").style.display="none";

leftDrawer.style.left="-330px";

overlay.style.display="none";

}

}

);

viewerContainer.addEventListener(

"wheel",

function(e){

if(e.ctrlKey){

e.preventDefault();

if(e.deltaY<0){

zoom+=0.05;

}else{

if(zoom>0.30){

zoom-=0.05;

}

}

renderPage(currentPage);

}

},

{passive:false}

);

let touchStartDistance=0;
let touchCurrentDistance=0;
let initialZoom=1;

viewerContainer.addEventListener(

"touchstart",

function(e){

if(e.touches.length==2){

touchStartDistance=

Math.hypot(

e.touches[0].pageX-
e.touches[1].pageX,

e.touches[0].pageY-
e.touches[1].pageY

);

initialZoom=zoom;

}

}

);

viewerContainer.addEventListener(

"touchmove",

function(e){

if(e.touches.length==2){

touchCurrentDistance=

Math.hypot(

e.touches[0].pageX-
e.touches[1].pageX,

e.touches[0].pageY-
e.touches[1].pageY

);

zoom=

initialZoom*
(touchCurrentDistance/touchStartDistance);

renderPage(currentPage);

}

}

);
let autoHideTimer = null;

function showToast(message,time=2000){

toast.innerHTML = message;

toast.style.display = "block";

clearTimeout(autoHideTimer);

autoHideTimer = setTimeout(()=>{

toast.style.display = "none";

},time);

}

function saveReadingProgress(){

localStorage.setItem(

"pdf_last_page_"+pdfFile,

currentPage

);

localStorage.setItem(

"pdf_last_zoom_"+pdfFile,

zoom

);

localStorage.setItem(

"pdf_last_rotation_"+pdfFile,

rotation

);

}

function restoreReadingProgress(){

const savedPage = parseInt(

localStorage.getItem(

"pdf_last_page_"+pdfFile

)

);

const savedZoom = parseFloat(

localStorage.getItem(

"pdf_last_zoom_"+pdfFile

)

);

const savedRotation = parseInt(

localStorage.getItem(

"pdf_last_rotation_"+pdfFile

)

);

if(savedPage){

currentPage = savedPage;

}

if(savedZoom){

zoom = savedZoom;

}

if(savedRotation){

rotation = savedRotation;

}

}

setInterval(saveReadingProgress,1000);

window.addEventListener(

"beforeunload",

saveReadingProgress

);

document.addEventListener(

"contextmenu",

function(e){

e.preventDefault();

showToast("Right Click Disabled");

}

);

document.addEventListener(

"copy",

function(e){

e.preventDefault();

showToast("Copy Disabled");

}

);

document.addEventListener(

"cut",

function(e){

e.preventDefault();

showToast("Cut Disabled");

}

);

document.addEventListener(

"dragstart",

function(e){

e.preventDefault();

}

);

document.addEventListener(
    "selectstart",
    function(e){

        if(e.target.tagName != "INPUT"){
            e.preventDefault();
        }

    }
);

window.addEventListener(

"blur",

function(){

function formatTime(seconds){

const h=Math.floor(seconds/3600);

const m=Math.floor((seconds%3600)/60);

const s=Math.floor(seconds%60);

return (

String(h).padStart(2,"0")

+":"

+

String(m).padStart(2,"0")

+":"

+

String(s).padStart(2,"0")

);

}
